services:
  - type: web
    name: worldmarkets-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://worldmarkets.in,https://www.worldmarkets.in,https://worldmarkets.vercel.app,http://localhost:3000
